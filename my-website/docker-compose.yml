services:
  app:
    # ECR_REPO is written to a .env alongside this file by deploy.sh (not committed).
    # Deploy an immutable, rollback-able tag: IMAGE_TAG=<git-sha> docker compose up -d
    image: ${ECR_REPO}:${IMAGE_TAG:-latest}
    container_name: my-website
    restart: always
    expose:
      - "3000"
    # NODE_ENV / PORT / HOSTNAME are baked into the image (see Dockerfile).
    healthcheck:
      # Use the IPv4 loopback literal: the server binds 0.0.0.0 (IPv4-only) and
      # busybox wget would otherwise try ::1 first and report the container unhealthy.
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      # Without a start period the first probe only fires one full interval (30s)
      # in, so every deploy waits 30s on a container that serves in about a second.
      # start_interval polls every 2s until the first success (needs Engine 25.0+).
      start_period: 30s
      start_interval: 2s
    # Defense-in-depth: app runs as non-root (Dockerfile) and needs no capabilities.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [ webnet ]

  caddy:
    image: caddy:2-alpine@sha256:86deaf5e3d3408a6ccec08fbb79989783dd26e206ae10bcf78a801dc8c9ab794
    container_name: sam-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data # cert storage (persist for renewals)
      - caddy_config:/config
    # Caddy binds privileged ports 80/443, so it keeps NET_BIND_SERVICE.
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - app
    networks: [ webnet ]

volumes:
  caddy_data:
  caddy_config:


networks:
  webnet:
    driver: bridge
