services:
  app:
    image: <your-account-id>.dkr.ecr.us-east-1.amazonaws.com/veridical-manufacturing:latest
    container_name: veridical-manufacturing
    restart: always
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      HOST: "0.0.0.0"
      PORT: "3000"
      NODE_ENV: "production"
    # If your image doesn't include curl/wget, remove/adjust this healthcheck
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [ webnet ]
    # If your image does NOT start Next by itself, uncomment this:
    # command: ["node","node_modules/next/dist/bin/next","start","-p","3000"]

  caddy:
    image: caddy:2-alpine
    container_name: sam-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data # cert storage (persist for renewals)
      - caddy_config:/config
    depends_on:
      - app
    networks: [ webnet ]

volumes:
  caddy_data:
  caddy_config:


networks:
  webnet:
    driver: bridge
