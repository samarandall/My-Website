name: CI

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Weekly re-scan so newly-disclosed CVEs in the digest-pinned base images surface.
    - cron: "0 6 * * 1"

defaults:
  run:
    working-directory: my-website

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: my-website/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      # Fail the build on known high/critical production-dependency advisories.
      - run: npm audit --omit=dev --audit-level=high

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build production image
        run: docker build -t my-website:ci .

      # Scan the built image for known OS/library vulnerabilities.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: my-website:ci
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
